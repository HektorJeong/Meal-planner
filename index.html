<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>식단 플래너</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f3ef;
  --card: #ffffff;
  --border: #e2dbd2;
  --accent: #c8602a;
  --accent-pale: #fdf1ea;
  --green-pale: #ebf4ef;
  --purple-pale: #f0edf8;
  --text: #1e1a14;
  --muted: #938678;
  --light: #b8aca0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; }

/* NAV */
nav {
  background: var(--text); color: #f5f3ef;
  padding: 0 20px; display: flex; align-items: center;
  justify-content: space-between; height: 52px;
  position: sticky; top: 0; z-index: 50;
}
nav h1 { font-size: 15px; font-weight: 700; }
.sync-status {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; padding: 3px 10px; border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.5);
  transition: all 0.3s;
}
.sync-status.synced  { color: #7bf9b4; border-color: rgba(123,249,180,0.4); }
.sync-status.syncing { color: #f9d97b; border-color: rgba(249,217,123,0.4); }
.sync-status.error   { color: #f97b7b; border-color: rgba(249,123,123,0.4); }

.nav-tabs { display: flex; }
.nav-tab {
  padding: 0 16px; height: 52px; line-height: 52px;
  font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.5);
  cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s;
}
.nav-tab.active { color: #fff; border-bottom-color: var(--accent); }

/* LAYOUT */
.page { display: none; max-width: 860px; margin: 0 auto; padding: 28px 16px 60px; }
.page.active { display: block; animation: up 0.2s ease; }
@keyframes up { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* 로딩 */
.loading-bar {
  position: fixed; top: 52px; left: 0; right: 0;
  height: 2px; background: var(--accent);
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.3s ease; z-index: 100;
}
.loading-bar.active { transform: scaleX(1); }

/* 메뉴 등록 */
.page-head { margin-bottom: 22px; }
.page-head h2 { font-size: 22px; font-weight: 900; letter-spacing: -0.02em; }
.page-head p  { font-size: 13px; color: var(--muted); margin-top: 4px; }

.add-row { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }
.add-row input {
  flex: 1; min-width: 140px;
  border: 1.5px solid var(--border); border-radius: 8px;
  padding: 10px 14px; font-size: 14px; font-family: inherit;
  background: var(--card); color: var(--text); outline: none;
  transition: border-color 0.15s;
}
.add-row input:focus { border-color: var(--accent); }
.add-row select {
  border: 1.5px solid var(--border); border-radius: 8px;
  padding: 10px 10px; font-size: 13px; font-family: inherit;
  background: var(--card); color: var(--text); outline: none; cursor: pointer;
}
.btn-primary {
  padding: 10px 20px; background: var(--text); color: #f5f3ef;
  border: none; border-radius: 8px; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: inherit; white-space: nowrap; transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.82; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

.reg-section { margin-bottom: 20px; }
.reg-section-title {
  font-size: 11px; font-weight: 700; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
}
.reg-section-title::after { content:''; flex:1; height:1px; background: var(--border); }
.chips-wrap { display: flex; flex-wrap: wrap; gap: 7px; min-height: 36px; }
.chip {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 10px 6px 13px; border-radius: 30px;
  font-size: 13px; font-weight: 600; border: 1.5px solid;
  animation: pop 0.15s ease;
}
@keyframes pop { from { transform:scale(0.88); opacity:0; } to { transform:scale(1); opacity:1; } }
.chip-b { background: #fff8e6; border-color: #f0d070; }
.chip-l { background: var(--green-pale); border-color: #90c4a0; }
.chip-d { background: var(--purple-pale); border-color: #c0aee8; }
.chip-a { background: #f5f3ef; border-color: var(--border); }
.chip-del {
  width: 16px; height: 16px; border-radius: 50%;
  background: rgba(0,0,0,0.07); color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 900; cursor: pointer; transition: all 0.12s;
}
.chip-del:hover { background: #f5c0a8; color: var(--accent); }
.no-item { font-size: 13px; color: var(--light); align-self: center; }

/* 식단 플래너 */
.week-strip {
  display: flex; gap: 6px; overflow-x: auto;
  padding-bottom: 2px; margin-bottom: 24px;
}
.day-btn {
  flex-shrink: 0; text-align: center;
  padding: 10px 14px; border-radius: 12px;
  border: 1.5px solid var(--border); background: var(--card);
  cursor: pointer; transition: all 0.15s; min-width: 64px;
}
.day-btn:hover { border-color: var(--accent); }
.day-btn.active { background: var(--text); border-color: var(--text); color: #f5f3ef; }
.day-btn .db-date { font-size: 11px; font-weight: 600; opacity: 0.6; }
.day-btn .db-day  { font-size: 15px; font-weight: 900; margin: 2px 0; }
.day-btn .db-dot  {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent); margin: 0 auto;
  opacity: 0; transition: opacity 0.15s;
}
.day-btn.has-data .db-dot { opacity: 1; }
.day-btn.active .db-dot { background: rgba(255,255,255,0.5); }

.day-content { display: none; }
.day-content.active { display: block; animation: up 0.18s ease; }
.day-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 18px; }
.day-header h2 { font-size: 24px; font-weight: 900; letter-spacing: -0.02em; }
.day-header span { font-size: 13px; color: var(--muted); }

.meal-cols { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
@media(max-width:540px){ .meal-cols { grid-template-columns:1fr; } }

.meal-col {
  border-radius: 14px; padding: 16px; min-height: 130px;
  display: flex; flex-direction: column; gap: 8px; border: 1.5px solid;
}
.mc-b { background:#fff8e6; border-color:#f0d070; }
.mc-l { background:var(--green-pale); border-color:#90c4a0; }
.mc-d { background:var(--purple-pale); border-color:#c0aee8; }
.mc-label { font-size: 10px; font-weight: 700; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); }
.mc-items { display:flex; flex-wrap:wrap; gap:5px; flex:1; }
.mc-item {
  display:flex; align-items:center; gap:5px;
  padding: 4px 8px 4px 10px; border-radius:20px;
  background: rgba(255,255,255,0.75); border:1px solid rgba(0,0,0,0.08);
  font-size:12px; font-weight:600;
}
.mc-item-del { font-size:9px; color:var(--light); cursor:pointer; padding:1px 2px; }
.mc-item-del:hover { color:var(--accent); }
.mc-add {
  padding: 5px 10px; border-radius:20px;
  border: 1.5px dashed rgba(0,0,0,0.15); background:transparent;
  font-size:11px; color:var(--muted); cursor:pointer;
  font-family:inherit; width:fit-content; transition:all 0.15s;
}
.mc-add:hover { border-color:var(--accent); color:var(--accent); }

/* PICKER SHEET */
.sheet-bg {
  position:fixed; inset:0; background:rgba(30,26,20,0.45);
  z-index:100; display:none; align-items:flex-end; justify-content:center;
}
.sheet-bg.open { display:flex; }
@media(min-width:560px){ .sheet-bg { align-items:center; } }
.sheet {
  background:var(--card); width:100%; max-width:440px;
  border-radius:20px; padding:24px;
  box-shadow:0 20px 60px rgba(0,0,0,0.18);
  animation: sheetUp 0.22s ease;
  display:flex; flex-direction:column; max-height:85vh;
}
@keyframes sheetUp { from{transform:translateY(30px);opacity:0;} to{transform:translateY(0);opacity:1;} }
.sheet-head { margin-bottom:16px; flex-shrink:0; }
.sheet-head h3 { font-size:17px; font-weight:700; }
.sheet-head p  { font-size:12px; color:var(--muted); margin-top:3px; }
.sheet-chips { display:flex; flex-wrap:wrap; gap:7px; overflow-y:auto; flex:1; padding-bottom:4px; align-content:flex-start; }
.s-chip {
  padding:7px 14px; border-radius:30px; border:1.5px solid var(--border);
  background:var(--card); font-size:13px; font-weight:600;
  cursor:pointer; transition:all 0.15s;
}
.s-chip:hover { border-color:var(--accent); background:var(--accent-pale); }
.s-chip.sel   { background:var(--text); color:#f5f3ef; border-color:var(--text); }
.s-chip-b { background:#fff8e6; border-color:#f0d070; }
.s-chip-l { background:var(--green-pale); border-color:#90c4a0; }
.s-chip-d { background:var(--purple-pale); border-color:#c0aee8; }
.s-chip-a { background:#f5f3ef; border-color:var(--border); }
.s-chip-b.sel,.s-chip-l.sel,.s-chip-d.sel,.s-chip-a.sel { background:var(--text); color:#f5f3ef; border-color:var(--text); }
.no-menu-hint { font-size:13px; color:var(--light); padding:6px 0; }
.no-menu-hint a { color:var(--accent); cursor:pointer; text-decoration:underline; }
.sheet-foot { display:flex; gap:8px; margin-top:16px; flex-shrink:0; }
.btn-confirm {
  flex:1; padding:12px; background:var(--text); color:#f5f3ef;
  border:none; border-radius:8px; font-size:14px; font-weight:700;
  cursor:pointer; font-family:inherit; transition:opacity 0.15s;
}
.btn-confirm:hover { opacity:0.82; }
.btn-sheet-close {
  padding:12px 16px; border:1.5px solid var(--border); border-radius:8px;
  background:transparent; color:var(--muted); font-size:13px;
  cursor:pointer; font-family:inherit;
}

/* TOAST */
.toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(70px);
  background:var(--text); color:#f5f3ef;
  padding:9px 20px; border-radius:30px; font-size:13px; font-weight:600;
  transition:transform 0.25s ease; z-index:200; pointer-events:none; white-space:nowrap;
}
.toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<nav>
  <h1>🍱 식단 플래너</h1>
  <span class="sync-status" id="syncStatus">연결 중...</span>
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="goPage('reg')">메뉴 등록</div>
    <div class="nav-tab" onclick="goPage('plan')">식단 배정</div>
  </div>
</nav>

<!-- 메뉴 등록 -->
<div class="page active" id="page-reg">
  <div class="page-head">
    <h2>메뉴 등록</h2>
    <p>아침·점심·저녁·공통 메뉴를 미리 등록해두세요</p>
  </div>
  <div class="add-row">
    <input id="menuInput" placeholder="메뉴 이름 (예: 된장찌개)" maxlength="20">
    <select id="menuCat">
      <option value="b">🌅 아침</option>
      <option value="l">☀️ 점심</option>
      <option value="d">🌙 저녁</option>
      <option value="a">🍽️ 공통</option>
    </select>
    <button class="btn-primary" id="addBtn" onclick="addMenu()">+ 추가</button>
  </div>
  <div id="regList"></div>
</div>

<!-- 식단 배정 -->
<div class="page" id="page-plan">
  <div class="week-strip" id="weekStrip"></div>
  <div id="dayContents"></div>
</div>

<!-- Picker Sheet -->
<div class="sheet-bg" id="sheetBg">
  <div class="sheet">
    <div class="sheet-head">
      <h3 id="sheetTitle">메뉴 선택</h3>
      <p>여러 개 선택 후 확인을 누르세요</p>
    </div>
    <div class="sheet-chips" id="sheetChips"></div>
    <div class="sheet-foot">
      <button class="btn-confirm" onclick="confirmSheet()">확인</button>
      <button class="btn-sheet-close" onclick="closeSheet()">닫기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc, deleteDoc, query, orderBy }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGhVSesEac1nsEaSqQmt4K-TCZ_5_uARU",
  authDomain: "meal-planner-5dfe6.firebaseapp.com",
  projectId: "meal-planner-5dfe6",
  storageBucket: "meal-planner-5dfe6.firebasestorage.app",
  messagingSenderId: "145648901549",
  appId: "1:145648901549:web:98eef7eef2026cdfe59524"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ════════════════════════════
// 상태
// ════════════════════════════
const DAYS_KO  = ['월','화','수','목','금','토','일'];
const SLOT_KO  = { breakfast:'🌅 아침', lunch:'☀️ 점심', dinner:'🌙 저녁' };
const SLOT_CLS = { breakfast:'mc-b', lunch:'mc-l', dinner:'mc-d' };
const CAT_CLS  = { b:'chip-b', l:'chip-l', d:'chip-d', a:'chip-a' };
const SHEET_CLS= { b:'s-chip-b', l:'s-chip-l', d:'s-chip-d', a:'s-chip-a' };

let menus = [];       // { id, name, cat }
let weekData = {};    // { "2026-04-22": { breakfast:[], lunch:[], dinner:[] }, ... }
let curDay   = 0;
let sheetCtx = { dayIdx:0, slot:'breakfast' };
let sheetSel = [];

// 이번 주 날짜 배열
function getThisWeek() {
  const today = new Date();
  const dow   = today.getDay();
  const mon   = new Date(today);
  mon.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
  return Array.from({length:7}, (_, i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    return d;
  });
}
const weekDates = getThisWeek();

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDate(d) { return `${d.getMonth()+1}/${d.getDate()}`; }

// ════════════════════════════
// Firebase 실시간 구독
// ════════════════════════════
function setSyncStatus(status, msg) {
  const el = document.getElementById('syncStatus');
  el.className = 'sync-status ' + status;
  el.textContent = msg;
}

// 메뉴 목록 실시간 구독
const menusRef = collection(db, 'menus');
onSnapshot(query(menusRef, orderBy('createdAt')), snap => {
  menus = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderReg();
  setSyncStatus('synced', '● 동기화됨');
}, err => {
  setSyncStatus('error', '● 오류');
  console.error(err);
});

// 이번 주 식단 실시간 구독
const weekRef = doc(db, 'weeks', 'current');
onSnapshot(weekRef, snap => {
  weekData = snap.exists() ? snap.data() : {};
  renderPlanner();
  setSyncStatus('synced', '● 동기화됨');
}, err => {
  setSyncStatus('error', '● 오류');
});

// ════════════════════════════
// 메뉴 등록
// ════════════════════════════
window.addMenu = async function() {
  const name = document.getElementById('menuInput').value.trim();
  const cat  = document.getElementById('menuCat').value;
  if (!name) { toast('메뉴 이름을 입력하세요'); return; }
  setSyncStatus('syncing', '↑ 저장 중...');
  try {
    await addDoc(menusRef, { name, cat, createdAt: Date.now() });
    document.getElementById('menuInput').value = '';
    toast(`"${name}" 등록 완료 ✓`);
  } catch(e) {
    setSyncStatus('error', '● 오류');
    toast('저장 실패. 다시 시도해주세요');
  }
};

window.delMenu = async function(id) {
  const m = menus.find(x => x.id === id);
  if (!m) return;
  setSyncStatus('syncing', '↑ 저장 중...');
  try {
    await deleteDoc(doc(db, 'menus', id));
    // 식단에서도 해당 메뉴 제거
    const updated = { ...weekData };
    Object.keys(updated).forEach(dk => {
      ['breakfast','lunch','dinner'].forEach(s => {
        if (updated[dk]?.[s]) updated[dk][s] = updated[dk][s].filter(n => n !== m.name);
      });
    });
    await setDoc(weekRef, updated);
    toast(`"${m.name}" 삭제됨`);
  } catch(e) {
    setSyncStatus('error', '● 오류');
  }
};

function renderReg() {
  const cats = ['b','l','d','a'];
  const labels = { b:'🌅 아침', l:'☀️ 점심', d:'🌙 저녁', a:'🍽️ 공통' };
  document.getElementById('regList').innerHTML = cats.map(cat => {
    const items = menus.filter(m => m.cat === cat);
    return `
      <div class="reg-section">
        <div class="reg-section-title">${labels[cat]} (${items.length})</div>
        <div class="chips-wrap">
          ${items.length
            ? items.map(m => `
                <div class="chip ${CAT_CLS[cat]}">
                  ${m.name}
                  <span class="chip-del" onclick="delMenu('${m.id}')">✕</span>
                </div>`).join('')
            : '<span class="no-item">아직 없음</span>'
          }
        </div>
      </div>`;
  }).join('');
}

// ════════════════════════════
// 식단 플래너
// ════════════════════════════
function getDay(idx) {
  const key = dateKey(weekDates[idx]);
  return weekData[key] || { breakfast:[], lunch:[], dinner:[] };
}

async function saveDay(idx, slotData) {
  const key = dateKey(weekDates[idx]);
  const updated = { ...weekData, [key]: slotData };
  setSyncStatus('syncing', '↑ 저장 중...');
  try {
    await setDoc(weekRef, updated);
  } catch(e) {
    setSyncStatus('error', '● 오류');
    toast('저장 실패');
  }
}

window.switchDay = function(idx) {
  curDay = idx;
  renderPlanner();
};

window.removeItem = async function(dayIdx, slot, name) {
  const day = getDay(dayIdx);
  day[slot] = day[slot].filter(n => n !== name);
  await saveDay(dayIdx, day);
};

function totalForDay(idx) {
  const d = getDay(idx);
  return (d.breakfast?.length||0) + (d.lunch?.length||0) + (d.dinner?.length||0);
}

function renderPlanner() {
  renderStrip();
  renderDays();
}

function renderStrip() {
  document.getElementById('weekStrip').innerHTML = weekDates.map((date, i) => `
    <div class="day-btn ${i===curDay?'active':''} ${totalForDay(i)>0?'has-data':''}"
         onclick="switchDay(${i})">
      <div class="db-date">${fmtDate(date)}</div>
      <div class="db-day">${DAYS_KO[i]}</div>
      <div class="db-dot"></div>
    </div>`).join('');
}

function renderDays() {
  document.getElementById('dayContents').innerHTML = weekDates.map((date, i) => {
    const day = getDay(i);
    return `
      <div class="day-content ${i===curDay?'active':''}">
        <div class="day-header">
          <h2>${fmtDate(date)} ${DAYS_KO[i]}요일</h2>
          <span>${totalForDay(i)}개 메뉴 배정됨</span>
        </div>
        <div class="meal-cols">
          ${['breakfast','lunch','dinner'].map(slot => `
            <div class="meal-col ${SLOT_CLS[slot]}">
              <div class="mc-label">${SLOT_KO[slot]}</div>
              <div class="mc-items">
                ${(day[slot]||[]).map(name => `
                  <div class="mc-item">
                    ${name}
                    <span class="mc-item-del" onclick="removeItem(${i},'${slot}','${name}')">✕</span>
                  </div>`).join('')}
              </div>
              <button class="mc-add" onclick="openSheet(${i},'${slot}')">+ 메뉴 추가</button>
            </div>`).join('')}
        </div>
      </div>`;
  }).join('');
}

// ════════════════════════════
// 피커 시트
// ════════════════════════════
window.openSheet = function(dayIdx, slot) {
  sheetCtx = { dayIdx, slot };
  const day = getDay(dayIdx);
  sheetSel = [...(day[slot]||[])];

  const slotMap = { breakfast:'b', lunch:'l', dinner:'d' };
  const avail = menus.filter(m => m.cat === slotMap[slot] || m.cat === 'a');

  document.getElementById('sheetTitle').textContent =
    `${fmtDate(weekDates[dayIdx])} ${DAYS_KO[dayIdx]}요일 — ${SLOT_KO[slot]}`;

  document.getElementById('sheetChips').innerHTML = avail.length
    ? avail.map(m => `
        <div class="s-chip ${SHEET_CLS[m.cat]} ${sheetSel.includes(m.name)?'sel':''}"
             onclick="toggleSel('${m.name}', this)">
          ${m.name}
        </div>`).join('')
    : `<div class="no-menu-hint">등록된 메뉴가 없어요.
        <a onclick="closeSheet();goPage('reg')">메뉴 등록하러 가기 →</a></div>`;

  document.getElementById('sheetBg').classList.add('open');
};

window.toggleSel = function(name, el) {
  if (sheetSel.includes(name)) {
    sheetSel = sheetSel.filter(n => n !== name);
    el.classList.remove('sel');
  } else {
    sheetSel.push(name);
    el.classList.add('sel');
  }
};

window.confirmSheet = async function() {
  const { dayIdx, slot } = sheetCtx;
  const day = getDay(dayIdx);
  day[slot] = [...sheetSel];
  await saveDay(dayIdx, day);
  closeSheet();
  toast(`${sheetSel.length}개 배정 완료 ✓`);
};

window.closeSheet = function() {
  document.getElementById('sheetBg').classList.remove('open');
  sheetSel = [];
};

// ════════════════════════════
// 페이지 전환
// ════════════════════════════
window.goPage = function(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach((t,i) =>
    t.classList.toggle('active', (id==='reg'&&i===0)||(id==='plan'&&i===1)));
  document.getElementById('page-'+id).classList.add('active');
};

// ════════════════════════════
// 유틸
// ════════════════════════════
window.toast = function(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
};

function toast(msg) { window.toast(msg); }

document.getElementById('menuInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addMenu();
});
document.getElementById('sheetBg').addEventListener('click', e => {
  if (e.target === document.getElementById('sheetBg')) closeSheet();
});

</script>
</body>
</html>
